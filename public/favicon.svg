<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Lines connecting nodes -->
  <line x1="30" y1="30" x2="14" y2="16" stroke="#000" stroke-width="2.5"/>
  <line x1="30" y1="30" x2="50" y2="14" stroke="#000" stroke-width="2.5"/>
  <line x1="30" y1="30" x2="52" y2="34" stroke="#000" stroke-width="2.5"/>
  <line x1="30" y1="30" x2="16" y2="44" stroke="#000" stroke-width="2.5"/>
  <line x1="30" y1="30" x2="42" y2="52" stroke="#000" stroke-width="2.5"/>
  <!-- Central node -->
  <circle cx="30" cy="30" r="5.5" fill="#000"/>
  <!-- Outer nodes -->
  <circle cx="14" cy="16" r="4" fill="#000"/>
  <circle cx="50" cy="14" r="4" fill="#000"/>
  <circle cx="52" cy="34" r="4.5" fill="#000"/>
  <circle cx="16" cy="44" r="3.5" fill="#000"/>
  <circle cx="42" cy="52" r="4" fill="#000"/>
</svg>
